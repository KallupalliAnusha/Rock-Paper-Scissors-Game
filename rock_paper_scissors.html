<!DOCTYPE html>
<html>
  <head>
    <title>rock paper scissors</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="result('rock',computer());" class="move-button"><img src="images/rock-emoji.png"></button>
    <button onclick="result('paper',computer());" class="move-button"><img src="images/paper-emoji.png"></button>
    <button onclick="result('scissors',computer());" class="move-button"><img src="images/scissors-emoji.png"></button>
    <p class='displayResult'></p>
    <p class='displaySelection'></p>
    <p class='displayScore'></p>

    <button onclick="
    score.wins=0;
    score.lose=0;
    score.ties=0;
    localStorage.removeItem('score');
    reset();" class="reset-button">Reset Score</button>
    <script src="rps.js"></script>
  </body>
</html>
