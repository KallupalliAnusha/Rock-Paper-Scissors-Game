<!DOCTYPE html>
<html>
  <head>
    <title>DOM</title>
  </head>
  <body>
    <button onclick="subscribe();">Subscribe</button>
    <script>
      function subscribe(){
        const buttonElement=document.querySelector('button');
        if(buttonElement.innerHTML==='Subscribe'){
          buttonElement.innerHTML='Subscribed'
        }
        else{
          buttonElement.innerHTML='Subscribe'
        }
      }
    </script>
  </body>
</html>
